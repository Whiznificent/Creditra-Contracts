name: WASM Size

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  wasm-size:
    name: WASM size guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-size-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-size-

      - name: Run WASM size guard tests
        run: bash scripts/test_check_wasm_size.sh

      - name: Build and verify WASM size budget
        run: bash scripts/check-wasm-size.sh
